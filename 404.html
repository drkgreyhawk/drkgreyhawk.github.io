<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script data-goatcounter="https://drkgreyhawk.goatcounter.com/count" async src="//gc.zgo.at/count.js"></script>
  <title>404 | Hyrum Mack</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="container">
    <header class="header">
      <div class="terminal-prompt">$ cd /404</div>
      <h1 class="name">404</h1>
      <p class="subtitle">Page <span class="code-accent">|</span> Not Found</p>
    </header>

    <main>
      <section class="card">
        <h2 class="card-title">Error</h2>
        <p class="about-text">
          The page you're looking for doesn't exist, moved, or never was. Let's get you back on track.
        </p>
      </section>

      <section class="card">
        <h2 class="card-title">Navigate</h2>
        <div class="projects-grid">
          <div class="project-item">
            <a href="/" class="project-link">
              <span>Home</span>
            </a>
          </div>
        </div>
      </section>
    </main>

    <footer class="footer">
      <p>$ echo "404: page not found"</p>
    </footer>
  </div>
</body>

</html>
